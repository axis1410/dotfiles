format = """
$directory$git_branch$git_status$python$fill$cmd_duration$time
$character"""

add_newline = false

[character]
success_symbol = "[❯](bold fg:#c792ea)"
error_symbol = "[❯](bold fg:#e06c75)"

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"
format = "[$path]($style) "

[git_branch]
symbol = ""
style = "bold magenta"
format = "[· $branch]($style) "

[git_status]
style = "yellow"
format = "([· $all_status$ahead_behind]($style)) "
ahead = "↑$count"
behind = "↓$count"
diverged = "↑$ahead_count↓$behind_count"
modified = "!$count"
staged = "+$count"
untracked = "?$count"
deleted = "-$count"
conflicted = "=$count"

[python]
symbol = ""
style = "green"
format = "[· $virtualenv]($style) "
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "setup.py", "requirements.txt"]
detect_folders = ["__pycache__"]

[fill]
symbol = " "

[cmd_duration]
min_time = 500
style = "dimmed white"
format = "[· $duration]($style) "

[time]
disabled = false
style = "dimmed white"
format = "[· $time]($style) "
time_format = "%H:%M"
