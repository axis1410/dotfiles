# vim:fileencoding=utf-8:ft=kitty

# Font
font_family      CommitMono Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0
disable_ligatures never

# Cursor
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
cursor #AA9BF5
cursor_text_color #1A1A1A

# Smear / trail effect
cursor_trail 3
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 2
cursor_trail_color #AA9BF5

# Mouse
mouse_hide_wait 1.0
copy_on_select no
strip_trailing_spaces smart

# Window
remember_window_size yes
initial_window_width 155c
initial_window_height 36c
enabled_layouts tall:bias=50;full_size=1;mirrored=false,stack
window_padding_width 0
window_margin_width 0
placement_strategy center
hide_window_decorations titlebar-only
macos_titlebar_color background
macos_option_as_alt yes
macos_show_window_title_in all

# Background
background_opacity 0.90
background_blur 1
dynamic_background_opacity yes

# Terminal behavior
term xterm-kitty
shell_integration enabled
scrollback_lines 10000
sync_to_monitor yes
confirm_os_window_close 0
enable_audio_bell no
visual_bell_duration 0.0

# Keyboard
map cmd+r load_config_file
map cmd+n new_os_window
map cmd+t new_tab
map cmd+w close_window
map cmd+shift+enter launch --cwd=current
map cmd+shift+] next_tab
map cmd+shift+[ previous_tab
map cmd+plus change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0 change_font_size all 0

# Ghostty - Cursor Dark
foreground #D8DEE9
background #1A1A1A
selection_foreground #1A1A1A
selection_background #D8DEE9

color0  #505050
color1  #BF616A
color2  #A3BE8C
color3  #EFB080
color4  #85C1FC
color5  #AA9BF5
color6  #88C0D0
color7  #D8DEE9
color8  #505050
color9  #BF616A
color10 #A3BE8C
color11 #EBC88D
color12 #85C1FC
color13 #C582BF
color14 #83D6C5
color15 #D8DEE9

# Tabs
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style slanted
active_tab_foreground #1A1A1A
active_tab_background #AA9BF5
inactive_tab_foreground #D8DEE9
inactive_tab_background #303030

# URLs
url_color #85C1FC
url_style curly
open_url_with default
