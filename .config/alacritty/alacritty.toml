[general]
import = [
  "~/.config/alacritty/themes/alacritty-theme/themes/tomorrow_night.toml",
]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 165, lines = 50 }
position = { x = 0, y = 1 }
padding = { x = 0, y = 2 }
decorations = "Buttonless"
dynamic_padding = true
blur = true
opacity = 0.75
decorations_theme_variant = "Dark"
# startup_mode = "Fullscreen"
# startup_mode = "SimpleFullScreen"
startup_mode = "Maximized"

[font]
# normal = { family = "0xProto Nerd Font Mono" }
normal = { family = "JetBrainsMono Nerd Font Mono" }
# normal = { family = "Iosevka Nerd Font Mono" }
# normal = { family = "CommitMono Nerd Font Mono" }
# normal = { family = "Hack Nerd Font Mono" }
size = 14
offset = { x = 0, y = -2 }

# normal = { family = "MonaSpiceNe Nerd Font Mono" }
# normal = { family = "MonoLisa Nerd Font Mono" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true


[[keyboard.bindings]]
key = "Enter"
mods = "Shift"
chars = "\u001b[13;2u"
