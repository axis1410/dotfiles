set-option -sa terminal-overrides ",xterm*:Tc"

set -g status-interval 1

set -g focus-events on

set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g status on
set -g default-terminal "tmux-256color"

set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",tmux-256color:RGB"

set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g mouse on
set -g status-position bottom
set -g set-clipboard on

set -g prefix C-a
unbind C-b; bind-key C-a send-prefix

unbind %
bind | split-window -h

unbind '"'
bind - split-window -v

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux config reloaded"
bind-key b set-option status

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection
unbind-key -T copy-mode-vi MouseDragEnd1Pane


bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

# Catppuccin theme with transparent bar background
set -g status-position bottom
set -g status-style "bg=default"
set -g status-justify centre
set -g status-left-length 120
set -g status-right-length 80

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "default"
set -g @catppuccin_status_left_separator ""
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_middle_separator " "
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_status_module_text_bg "#{@thm_surface_0}"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_middle_separator "█"
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_text ""
set -g @catppuccin_window_current_text ""
set -g @catppuccin_window_number " #I "
set -g @catppuccin_window_current_number " #I "
set -g @catppuccin_window_number_color "#{@thm_overlay_0}"
set -g @catppuccin_window_text_color "#{@thm_overlay_0}"
set -g @catppuccin_window_current_number_color "#{@thm_blue}"
set -g @catppuccin_window_current_text_color "#{@thm_blue}"
set -g @catppuccin_window_flags "icon"
set -g @catppuccin_window_flags_icon_current ""
set -g @catppuccin_window_flags_icon_last ""

set -g @catppuccin_session_icon ""
set -g @catppuccin_session_color "#{@thm_green}"
set -g @catppuccin_session_text " #S"

set -g @catppuccin_directory_icon "󰉋"
set -g @catppuccin_directory_color "#{@thm_blue}"
set -g @catppuccin_directory_text " #{=/-28/...:#{b:pane_current_path}}"

set -g @catppuccin_application_icon "󰆍"
set -g @catppuccin_application_color "#{@thm_mauve}"
set -g @catppuccin_application_text " #{pane_current_command}#{?window_zoomed_flag,  󰁌,}"

set -g @catppuccin_date_time_icon "󰃭"
set -g @catppuccin_date_time_color "#{@thm_peach}"
set -g @catppuccin_date_time_text " %a %b %d %H:%M"

set -g pane-border-style "fg=#{@thm_overlay_0},bg=default"
set -g pane-active-border-style "fg=#{@thm_lavender},bg=default"

run '~/.config/tmux/plugins/tpm/tpm'

run '~/.config/tmux/plugins/catppuccin/catppuccin.tmux'

set -g status-style "bg=default"
set -g window-status-format "#[fg=#{@thm_overlay_0},bg=default]#[fg=#{@thm_crust},bg=#{@thm_overlay_0},bold] #I #[fg=#{@thm_overlay_0},bg=default]"
set -g window-status-current-format "#[fg=#{@thm_blue},bg=default]#[fg=#{@thm_crust},bg=#{@thm_blue},bold] #I #[fg=#{@thm_blue},bg=default]"
set -g window-status-separator " "
set -g status-left "#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_application}"
set -g status-right "#{E:@catppuccin_status_date_time}"
set -g status-format[0] "#[bg=default,align=left]#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}#{E:@catppuccin_status_application}#[bg=default,align=absolute-centre]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[bg=default,align=right]#{E:@catppuccin_status_date_time}"
