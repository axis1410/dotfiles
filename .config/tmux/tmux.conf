set-option -sa terminal-overrides ",xterm*:Tc"
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -as terminal-features ",tmux-256color:RGB"

# set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
# set -g allow-passthrough all

setw -g monitor-activity on
set -g visual-activity off
set -g status-position top

set -g focus-events on
set -g mouse on
set -g set-clipboard on
set -sg escape-time 0
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 1
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "󰑓  Config reloaded"

bind-key b set-option status

unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind g display-popup -E -w 80% -h 75% -d "#{pane_current_path}" "zsh"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z

bind > swap-pane -D
bind < swap-pane -U

bind-key -r Left  swap-window -t -1 \; previous-window
bind-key -r Right swap-window -t +1 \; next-window

setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
unbind-key -T copy-mode-vi MouseDragEnd1Pane
bind Enter copy-mode

bind-key -n S-Enter run-shell "tmux send-keys -t '#{pane_id}' $'\\033[13;2u'"

# ───────────────────────────────────────────────────────────────────────────

bind-key "t" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set -g @resurrect-capture-pane-contents 'on'
# set -g @resurrect-strategy-nvim 'session'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# ── noir ───────────────────────────────────────────────────────────────────
BG="#0c0c0c"
STATUS_BG="#080808"
ACTIVE_BG="#1e1e1e"
FG="#505050"
FG_BRIGHT="#e8e8e8"
ACTIVE_FG="#f2f2f2"
ACCENT="#a0a0a0"
BORDER="#252525"
PREFIX_BG="#2e2e2e"
PREFIX_FG="#ffffff"
COPY_FG="#c8c8c8"
ZOOM_FG="#787878"

set -g status-style                 "bg=${STATUS_BG},fg=${FG}"
set -g status-left                  "#{?client_prefix,#[bg=${PREFIX_BG} fg=${PREFIX_FG} bold],#[fg=${ACCENT} bold]} #S #{?client_prefix,#[bg=default fg=${BORDER}],#[fg=${BORDER}]}│ "
set -g status-right  "#{?window_zoomed_flag,#[fg=${ZOOM_FG}]  ZOOM ,}#{?pane_in_mode,#[fg=${COPY_FG}]  COPY ,}#[fg=${FG}] %H:%M "
set -g status-right-length          36
set -g status-left-length           32

set -g window-status-format         "#[fg=${FG}] #I #W "
set -g window-status-current-format "#[fg=${ACTIVE_FG},bg=${ACTIVE_BG}] #I #W "
set -g window-status-style          "fg=${FG}"
set -g window-status-current-style  "fg=${ACTIVE_FG},bg=${ACTIVE_BG}"
set -g window-status-separator      ""
set -g status-justify               left

set -g pane-border-style            "fg=${BORDER}"
set -g pane-active-border-style     "fg=${ACCENT}"
set -g message-style                "bg=${ACTIVE_BG},fg=${FG_BRIGHT}"
set -g message-command-style        "bg=${ACTIVE_BG},fg=${ACCENT}"

set -g mode-style 		    "bg=#e8e8e8,fg=#0c0c0c"
# set -g mode-style                   "bg=${ACTIVE_BG},fg=${COPY_FG}"
# ───────────────────────────────────────────────────────────────────────────

run '~/.config/tmux/plugins/tpm/tpm'
